<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>极简个人首页</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');

        body {
            overflow-x: hidden; /* 禁止横向滚动（防止左右晃动） */
    overflow-y: auto;   /* 允许纵向滚动（让用户能往下看） */
    height: auto;       /* 不要写死 100vh，让高度随内容伸缩 */
    min-height: 100vh;  /* 保证至少占满一屏 */
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #000000, #1a1a1a, #0a0a0a, #000000);
            background-size: 400% 400%;
            animation: gradientMove 10s ease infinite;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            overflow: hidden;
            cursor: none; /* 电脑端隐藏原生鼠标 */
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #cursor {
            mix-blend-mode: difference;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 0 20px #38bdf8;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            left: -100px; /* 初始位置移出屏幕 */
        }

        #cursor.active { transform: scale(3); }

        .card { text-align: center; z-index: 10; }
        .card-title { font-size: 80px; font-weight: 700; margin-bottom: 40px; letter-spacing: -2px; }

        .primary-btn {
            background: white;
            color: black;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
        }

        /* 2. 手机端专项优化 */
        @media (max-width: 768px) {
            #cursor { display: none; }
            body { cursor: auto; }
            .card-title { font-size: 60px; }
            .primary-btn { padding: 18px 50px; font-size: 18px; }
        }
    </style>
</head>
<body>
    <div id="cursor"></div>
    <div class="card">
        <h1 class="card-title">Hello</h1>
        <button class="primary-btn">联系我</button>
        
    </div>
    <div class="content-section" style="padding: 50px 20px; text-align: center;">
        <h2>关于我</h2>
        <p>这是一个正在修仙学习前端的开发者。</p>
        <div style="height: 500px; background: rgba(255,255,255,0.1); margin-top: 20px; border-radius: 20px;">
            作品占位符
        </div>
    </div>
    <script>
        const btn = document.querySelector('.primary-btn');
        const dot = document.querySelector('#cursor');

        // 只在有鼠标的设备上监听移动
        window.addEventListener('mousemove', (e) => {
            dot.style.left = e.clientX - 10 + 'px';
            dot.style.top = e.clientY - 10 + 'px';
        });

        btn.addEventListener('mouseenter', () => dot.classList.add('active'));
        btn.addEventListener('mouseleave', () => dot.classList.remove('active'));
    </script>
</body>
</html>
