<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>极简个人首页</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            /* 修正：允许垂直滚动，禁止水平晃动 */
            overflow-x: hidden;
            overflow-y: auto; 
            min-height: 100vh;
            display: flex;
            flex-direction: column; /* 让内容按顺序往下排 */
            justify-content: flex-start; /* 从顶部开始排，不再死锁在中心 */
            align-items: center;
            background: linear-gradient(-45deg, #000000, #1a1a1a, #0a0a0a, #000000);
            background-size: 400% 400%;
            animation: gradientMove 10s ease infinite;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            cursor: none; 
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #cursor {
            mix-blend-mode: difference;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 0 20px #38bdf8;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            left: -100px;
        }

        #cursor.active { transform: scale(3); }

        /* 第一屏：Hero Section */
        .hero {
            height: 100vh; /* 第一屏强制占满全屏 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .card-title { font-size: 80px; font-weight: 700; margin-bottom: 40px; letter-spacing: -2px; }

        .primary-btn {
            background: white;
            color: black;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        /* 后面内容块的样式 */
        .content-section {
            width: 100%;
            max-width: 800px;
            padding: 100px 20px;
            text-align: center;
            box-sizing: border-box;
        }

        @media (max-width: 768px) {
            #cursor { display: none; }
            body { cursor: auto; }
            .card-title { font-size: 60px; }
            .primary-btn { padding: 18px 50px; font-size: 18px; }
        }
    </style>
</head>
<body>
    <div id="cursor"></div>

    <section class="hero">
        <h1 class="card-title">Hello</h1>
        <a href="#" class="primary-btn">联系我</a>
    </section>

    <div class="content-section">
        <h2>关于我</h2>
        <p>这是一个正在修仙学习前端的开发者。</p>
        <div style="height: 500px; background: rgba(255,255,255,0.05); margin-top: 40px; border-radius: 20px; border: 1px dashed rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center;">
            作品占位符
        </div>
    </div>

    <script>
        const btn = document.querySelector('.primary-btn');
        const dot = document.querySelector('#cursor');

        window.addEventListener('mousemove', (e) => {
            dot.style.left = e.clientX - 10 + 'px';
            dot.style.top = e.clientY - 10 + 'px';
        });

        btn.addEventListener('mouseenter', () => dot.classList.add('active'));
        btn.addEventListener('mouseleave', () => dot.classList.remove('active'));
    </script>
</body>
</html>
